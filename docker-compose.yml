version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: coleta-postgres
    environment:
      POSTGRES_DB: coletainteligente
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coleta-network

  backend:
    build:
      context: ./coleta-inteligente
    container_name: coleta-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - coleta-network

  frontend:
    build:
      context: ./coleta-inteligente-web
    container_name: coleta-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - coleta-network

networks:
  coleta-network:
    driver: bridge

volumes:
  postgres_data: