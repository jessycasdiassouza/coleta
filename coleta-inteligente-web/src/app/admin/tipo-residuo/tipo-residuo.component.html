<div class="page" *ngIf="isLogado">

  <mat-card class="card">

    <h2>♻️ Tipos de Resíduos</h2>

    <div class="form">

      <mat-form-field appearance="outline">

        <mat-label>Nome do Resíduo</mat-label>

        <input matInput [(ngModel)]="tipo.nomeTipo">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Descrição</mat-label>

        <textarea
          matInput
          rows="3"
          [(ngModel)]="tipo.descricaoTipo">
        </textarea>

      </mat-form-field>

    </div>

    <button mat-raised-button class="btn-salvar" color="primary" (click)="salvar()">
      {{ editando ? 'Atualizar' : 'Salvar' }}
    </button>

  </mat-card>

  <mat-card class="card" *ngIf="tipos.length > 0">

    <h3>Tipos cadastrados</h3>

    <table mat-table [dataSource]="tipos" class="table">

      <ng-container matColumnDef="nomeTipo">

        <th mat-header-cell *matHeaderCellDef>
          Nome
        </th>

        <td mat-cell *matCellDef="let t">
          {{ t.nomeTipo }}
        </td>

      </ng-container>

      <ng-container matColumnDef="descricaoTipo">

        <th mat-header-cell *matHeaderCellDef>
          Descrição
        </th>

        <td mat-cell *matCellDef="let t">
          {{ t.descricaoTipo }}
        </td>

      </ng-container>

      <ng-container matColumnDef="acoes">

        <th mat-header-cell *matHeaderCellDef>
          Ações
        </th>

        <td mat-cell *matCellDef="let t">

          <button
            mat-button
            color="primary"
            (click)="editar(t)">

            Editar

          </button>

          <button
            mat-button
            color="warn"
            (click)="deletar(t.tipoResiduoId)">

            Excluir

          </button>

        </td>

      </ng-container>

      <tr mat-header-row
          *matHeaderRowDef="['nomeTipo','descricaoTipo','acoes']">
      </tr>

      <tr mat-row
          *matRowDef="let row; columns: ['nomeTipo','descricaoTipo','acoes']">
      </tr>

    </table>

  </mat-card>

</div>
