<div class="page" *ngIf="isLogado">

  <mat-card class="card">

    <h2>📍 Pontos de Coleta</h2>

    <div class="form">

      <mat-form-field appearance="outline">
        <mat-label>Título</mat-label>
        <input matInput [(ngModel)]="local.titulo" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Descrição</mat-label>
        <input matInput [(ngModel)]="local.descricao" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Logradouro</mat-label>
        <input matInput [(ngModel)]="local.logradouro" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Número</mat-label>
        <input matInput type="number"
               [(ngModel)]="local.numero" maxlength="5">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Complemento</mat-label>
        <input matInput [(ngModel)]="local.complemento" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Referência</mat-label>
        <input matInput [(ngModel)]="local.referencia" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Bairro</mat-label>
        <input matInput [(ngModel)]="local.bairro" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Cidade</mat-label>
        <input matInput [(ngModel)]="local.cidade" maxlength="255">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>UF</mat-label>
        <input matInput [(ngModel)]="local.uf" maxlength="2">
      </mat-form-field>

    </div>

    <button mat-raised-button class="btn-salvar" color="primary" (click)="salvar()">
      {{ editando ? 'Atualizar' : 'Salvar' }}
    </button>

  </mat-card>

  <mat-card class="card" *ngIf="locais.length > 0">

    <h3>Pontos cadastrados</h3>

    <table mat-table [dataSource]="locais" class="table">

      <ng-container matColumnDef="titulo">

        <th mat-header-cell *matHeaderCellDef>
          Título
        </th>

        <td mat-cell *matCellDef="let l">

          {{ l.titulo }}

        </td>

      </ng-container>

      <ng-container matColumnDef="endereco">

        <th mat-header-cell *matHeaderCellDef>
          Endereço
        </th>

        <td mat-cell *matCellDef="let l">

          {{ l.logradouro }},
          {{ l.numero }}

        </td>

      </ng-container>

      <ng-container matColumnDef="bairro">

        <th mat-header-cell *matHeaderCellDef>
          Bairro
        </th>

        <td mat-cell *matCellDef="let l">

          {{ l.bairro }}

        </td>

      </ng-container>

      <ng-container matColumnDef="cidade">

        <th mat-header-cell *matHeaderCellDef>
          Cidade
        </th>

        <td mat-cell *matCellDef="let l">

          {{ l.cidade }}/{{ l.uf }}

        </td>

      </ng-container>

      <ng-container matColumnDef="acoes">

        <th mat-header-cell *matHeaderCellDef>
          Ações
        </th>

        <td mat-cell *matCellDef="let l">

          <button
            mat-button
            color="primary"
            (click)="editar(l)">

            Editar

          </button>

          <button
            mat-button
            color="warn"
            (click)="deletar(l.localDescarteId)">

            Excluir

          </button>

        </td>

      </ng-container>

      <tr mat-header-row
          *matHeaderRowDef="[
            'titulo',
            'endereco',
            'bairro',
            'cidade',
            'acoes'
          ]">
      </tr>

      <tr mat-row
          *matRowDef="let row; columns: [
            'titulo',
            'endereco',
            'bairro',
            'cidade',
            'acoes'
          ]">
      </tr>

    </table>

  </mat-card>

</div>
